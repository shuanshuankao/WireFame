<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線框1_about</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 引用公版 style.css -->
    <link href="css/style.css" rel="stylesheet">

    <style>

    </style>

</head>


<body>
    <!-- 引用 header -->
    <div id="header-placeholder"></div>

    <!-- 內容區（wireframe） -->

    <!-- 品牌據點+據點地圖區塊 -->
    <div class="container" style="max-width: 1200px; margin: 50px auto;">
        <div class="d-flex border border-2" style="min-height: 200px;">
            <!-- 左邊：品牌據點 (縮小) -->
            <div class="flex-fill" style="flex: 0.8; border-right: 1px solid rgba(0,0,0,0.2); padding: 15px;">
                <div class="section-title">品牌據點</div>
                <div class="section-text">
                    我們的品牌據點遍佈全國各大城市，方便您體驗產品與設計風格。
                    每個據點都保持統一品牌氛圍與專業服務，歡迎親臨參觀。
                </div>
            </div>

            <!-- 右邊：據點地圖 (拉大) -->
            <div class="flex-fill" style="flex: 4.2; padding: 15px;">
                <div class="section-title">據點地圖</div>
                <div class="section-text">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3649.123456!2d121.5678!3d25.0345!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3456789abcdef!2sTaipei!5e0!3m2!1sen!2stw!4v1699999999999"
                        width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </div>
        </div>
    </div>



    <!-- 與我們聯繫 -->
    <div class="container" style="max-width: 1200px; margin: 50px auto;">
        <div class="d-flex border border-2" style="min-height: 200px; padding: 15px;">
            <div class="flex-fill">
                <div class="section-title">與我們聯繫</div>
                <div class="section-text">
                    若您有任何問題或合作需求，歡迎透過以下方式聯繫我們：
                    <ul>
                        <li>電話：02-1234-5678</li>
                        <li>電子郵件：contact@yourbrand.com</li>
                        <li>客服時間：週一至週五 09:00-18:00</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>



    <!-- 引用 footer -->
    <div id="footer-placeholder"></div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 載入 header
        fetch('includes/header.html')
            .then(res => res.text())
            .then(data => document.getElementById('header-placeholder').innerHTML = data);

        // 載入 footer
        fetch('includes/footer.html')
            .then(res => res.text())
            .then(data => document.getElementById('footer-placeholder').innerHTML = data);
    </script>
</body>

</html>
