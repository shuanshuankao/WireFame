<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線框1_stroy</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 引用公版 style.css -->
    <link href="css/style.css" rel="stylesheet">

    <style>
        /* 內容區塊分區設定 */

        /* 左右欄容器 */
        .story-container {
            max-width: 1000px;
            margin: 100px auto;
        }

        .story-row {
            display: flex;
            gap: 20px;
            /* 左右欄距離 */
        }

        /* 左欄 */
        .left-box {
            flex: 1;
            border: 2px solid black;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 15px;
        }

        /* 右欄 */
        .right-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            /* 上下欄距離 */
        }

        .content-box {
            border: 2px solid black;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .section-text {
            font-size: 18px;
            line-height: 1.6;
        }
    </style>

</head>


<body>
    <!-- 引用 header -->
    <div id="header-placeholder"></div>

    <!-- 內容區（wireframe） -->
    <!-- 品牌起源 -->
    <div class="story-container">
        <div class="story-row">
            <!-- 左欄：品牌理念 -->
            <div class="left-box">
                <div class="section-title">品牌理念</div>
                <div class="section-text">
                    我們相信設計不只是外觀，而是一種與人溝通的方式。
                    每一項產品都承載著我們對品質、細節與情感的堅持，希望讓使用者在日常中感受到溫度與價值。
                </div>
            </div>

            <!-- 右欄：品牌起源 + 品牌願景 -->
            <div class="right-box">
                <div class="content-box">
                    <div class="section-title">品牌起源</div>
                    <div class="section-text">
                        我們的品牌起源於一個簡單的想法：將生活中的美好細節轉化為能被感受的產品。
                        從最初的小型工作室開始，逐步累積經驗與風格，並持續探索屬於我們的品牌語言。
                    </div>
                </div>

                <div class="content-box">
                    <div class="section-title">品牌願景</div>
                    <div class="section-text">
                        未來，我們希望成為一個能夠跨越文化與地域的品牌，
                        透過持續創新與設計，讓更多人認識並喜愛我們所傳遞的生活風格。
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- 引用 footer -->
    <div id="footer-placeholder"></div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 載入 header
        fetch('includes/header.html')
            .then(res => res.text())
            .then(data => document.getElementById('header-placeholder').innerHTML = data);

        // 載入 footer
        fetch('includes/footer.html')
            .then(res => res.text())
            .then(data => document.getElementById('footer-placeholder').innerHTML = data);
    </script>


</body>

</html>
